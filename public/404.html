<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Digilari Construction</title>
    <!--
      GitHub Pages SPA fallback (rafgraph/spa-github-pages).
      GitHub serves this file for any unknown path. It rewrites the deep link
      into a query string and redirects to the app root, where index.html
      decodes it back into a clean URL for React Router.
      pathSegmentsToKeep = 1 because the site lives in a project subpath
      (lilmonstersam.github.io/construction.digilari-staging-site/).
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
