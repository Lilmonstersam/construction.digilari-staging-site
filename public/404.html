<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Digilari Construction</title>
    <!--
      GitHub Pages SPA fallback (rafgraph/spa-github-pages).
      GitHub serves this file for any unknown path. It rewrites the deep link
      into a query string and redirects to the app root, where index.html
      decodes it back into a clean URL for React Router.
      The script keeps the project segment in the redirected URL so deep links
      stay under lilmonstersam.github.io/construction.digilari-staging-site/.
    -->
    <script type="text/javascript">
      var appSegment = 'construction.digilari-staging-site';
      var l = window.location;
      var segments = l.pathname.split('/').filter(Boolean);
      var appIndex = segments.indexOf(appSegment);
      var baseSegments = appIndex >= 0 ? segments.slice(0, appIndex + 1) : [appSegment];
      var appPath = appIndex >= 0 ? segments.slice(appIndex + 1).join('/') : segments.join('/');

      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/' + baseSegments.join('/') + '/?/' +
        appPath.replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
