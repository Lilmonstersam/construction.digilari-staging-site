<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digilari Construction</title>
    <!-- GitHub Pages SPA: decode the redirected deep-link path written by 404.html -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var appBase = '/construction.digilari-staging-site';
          var basePath = l.pathname.endsWith('/') ? l.pathname.slice(0, -1) : l.pathname;
          if (!basePath || basePath === '/') {
            basePath = appBase;
          }
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          if (decoded === '/') {
            decoded = '';
          }
          window.history.replaceState(null, null, basePath + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
